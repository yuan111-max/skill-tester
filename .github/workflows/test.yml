name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 mypy PyYAML pytest pytest-cov

      - name: Debug — environment info
        run: |
          echo "Python: $(python --version)"
          echo "Pip:    $(pip --version)"
          pip list 2>/dev/null | grep -iE "PyYAML|pytest|coverage|flake8|mypy"
          echo "--- Import check ---"
          python -c "import scripts.analyze; import scripts.config; import scripts.evaluate; print('All imports OK')"
          echo "--- Test collection check ---"
          python -m pytest tests/ --collect-only -q 2>&1
          echo "--- PWD / file check ---"
          ls -la scripts/*.py
          echo "--- Encoding check ---"
          file tests/fixtures/bad_skill/SKILL.md tests/fixtures/good_skill/SKILL.md 2>/dev/null || echo "file command not available"

      - name: Lint with flake8
        run: |
          flake8 scripts/ tests/

      - name: Type check with mypy
        run: |
          mypy scripts/

      - name: Test with pytest
        run: |
          pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing --cov-fail-under=70

      - name: Validate self-test
        run: |
          python scripts/run_tests.py . --output json

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PyYAML pytest pytest-cov

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 scripts/ tests/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Test with pytest
        run: |
          pytest tests/ -v --cov=scripts --cov-report=term-missing --cov-fail-under=70

      - name: Validate self-test
        run: |
          python scripts/run_tests.py . --output json

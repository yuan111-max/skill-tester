name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 mypy PyYAML pytest pytest-cov

      - name: Debug — environment info
        run: |
          echo "Python: $(python --version)"
          echo "Pip:    $(pip --version)"
          pip list 2>/dev/null | grep -iE "PyYAML|pytest|coverage|flake8|mypy"
          echo "--- Import check ---"
          python -c "import scripts.analyze; import scripts.config; import scripts.evaluate; print('All imports OK')"
          echo "--- Test collection check ---"
          python -m pytest tests/ --collect-only -q 2>&1
          echo "--- PWD / file check ---"
          ls -la scripts/*.py
          echo "--- Encoding check ---"
          file tests/fixtures/bad_skill/SKILL.md tests/fixtures/good_skill/SKILL.md 2>/dev/null || echo "file command not available"

      - name: Lint with flake8
        run: |
          flake8 scripts/ tests/

      - name: Type check with mypy
        run: |
          mypy scripts/

      - name: Test with pytest
        continue-on-error: true
        run: |
          pytest tests/ -v --tb=long > pytest_raw.txt 2>&1; echo "EXIT_CODE=$?" >> pytest_raw.txt
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload pytest output as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: pytest_raw.txt
          retention-days: 1

      - name: Check test result
        if: always()
        run: |
          tail -1 pytest_raw.txt
          rc=$(tail -1 pytest_raw.txt | grep -oP 'EXIT_CODE=\K\d+' || echo 1)
          if [ "$rc" != "0" ]; then
            echo "Tests failed (exit code $rc)"
            cat pytest_raw.txt | grep -E "FAILED|ERROR|assert|Error" || true
            exit 1
          fi
          echo "All tests passed!"

      - name: Validate self-test
        run: |
          python scripts/run_tests.py . --output json

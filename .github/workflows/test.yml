name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 mypy PyYAML pytest pytest-cov

      - name: Debug — environment info
        run: |
          echo "Python: $(python --version)"
          echo "Pip:    $(pip --version)"
          pip list 2>/dev/null | grep -iE "PyYAML|pytest|coverage|flake8|mypy"
          echo "--- Import check ---"
          python -c "import scripts.analyze; import scripts.config; import scripts.evaluate; print('All imports OK')"
          echo "--- Test collection check ---"
          python -m pytest tests/ --collect-only -q 2>&1
          echo "--- PWD / file check ---"
          ls -la scripts/*.py
          echo "--- Encoding check ---"
          file tests/fixtures/bad_skill/SKILL.md tests/fixtures/good_skill/SKILL.md 2>/dev/null || echo "file command not available"

      - name: Lint with flake8
        run: |
          flake8 scripts/ tests/

      - name: Type check with mypy
        run: |
          mypy scripts/

      - name: Test with pytest
        run: |
          set +e
          overall_rc=0
          for tf in tests/test_analyze.py tests/test_config.py tests/test_evaluate.py tests/test_execute.py tests/test_formatters.py tests/test_generate.py tests/test_integration.py tests/test_run_tests.py; do
            echo "=== $tf ==="
            out=$(pytest "$tf" -v --tb=long 2>&1)
            rc=$?
            echo "$out"
            echo "Exit: $rc"
            echo ""
            if [ "$rc" != "0" ]; then
              overall_rc=1
              # Write full failure details to step summary
              {
                echo "### ❌ $tf (exit $rc)"
                echo '```'
                echo "$out"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              # Extract failure details and emit as annotations
              echo "$out" | grep -E "FAILED|ERROR|assert|Error|AssertionError" | while read -r line; do
                echo "::error file=$tf,title=Test Failure::$line"
              done
            else
              {
                echo "### ✅ $tf (all passed)"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          exit $overall_rc

      - name: Validate self-test
        run: |
          python scripts/run_tests.py . --output json
